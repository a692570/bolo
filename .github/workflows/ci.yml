name: Bolo CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  macos:
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Rust 1.88
        run: |
          rustup toolchain install 1.88.0 --profile minimal --component rustfmt
          rustup default 1.88.0
      - name: Prepare Python environments
        run: |
          python -m venv .venv-ci
          .venv-ci/bin/python -m pip install --disable-pip-version-check -r requirements.txt pytest
          BOLO_PYTHON_BOOTSTRAP=python BOLO_VENV_DIR="$RUNNER_TEMP/bolo-helper-venv" ./ensure-python-env.sh --sync
      - name: Check shell scripts
        run: bash -n install.sh ensure-python-env.sh update.sh restart.sh start-bolo.command start-bolo.sh
      - name: Check Rust formatting
        run: cargo fmt --all -- --check
      - name: Test Rust runtime
        run: cargo test --release
      - name: Test Python and onboarding scripts
        run: .venv-ci/bin/python -m pytest -q
